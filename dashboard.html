<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Queue Monitor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
    }

    #connection-status {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      background: #1e1e2e;
      color: #888;
    }

    #connection-status.connected {
      background: #0d2e1a;
      color: #2ecc71;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #2a2a3e;
      text-align: center;
    }

    .stat-card .value {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .stat-card .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card.pending .value {
      color: #f39c12;
    }

    .stat-card.running .value {
      color: #3498db;
    }

    .stat-card.completed .value {
      color: #2ecc71;
    }

    .stat-card.failed .value {
      color: #e74c3c;
    }

    .stat-card.workers .value {
      color: #9b59b6;
    }

    .stat-card.avg .value {
      color: #1abc9c;
      font-size: 28px;
    }

    .section {
      background: #1a1a2e;
      border-radius: 12px;
      border: 1px solid #2a2a3e;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .section-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a3e;
      font-size: 14px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #2ecc71;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #2a2a3e;
    }

    td {
      padding: 12px 20px;
      font-size: 14px;
      border-bottom: 1px solid #1e1e2e;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr.new-row {
      animation: highlight 1s ease-out;
    }

    @keyframes highlight {
      0% {
        background: #1e3a2e;
      }

      100% {
        background: transparent;
      }
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge.PENDING {
      background: #2e2200;
      color: #f39c12;
    }

    .badge.RUNNING {
      background: #001e3a;
      color: #3498db;
    }

    .badge.COMPLETED {
      background: #0d2e1a;
      color: #2ecc71;
    }

    .badge.FAILED {
      background: #2e0d0d;
      color: #e74c3c;
    }

    .badge.CANCELLED {
      background: #1e1e1e;
      color: #888;
    }

    .badge.ACTIVE {
      background: #1a0d2e;
      color: #9b59b6;
    }

    .badge.DEAD {
      background: #2e0d0d;
      color: #e74c3c;
    }

    .badge.STOPPED {
      background: #1e1e1e;
      color: #666;
    }

    .event-log {
      max-height: 200px;
      overflow-y: auto;
      padding: 12px 20px;
    }

    .event-item {
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid #1e1e2e;
      color: #888;
      display: flex;
      gap: 12px;
    }

    .event-item:last-child {
      border-bottom: none;
    }

    .event-item .time {
      color: #555;
      min-width: 80px;
    }

    .event-item .event-type {
      color: #3498db;
      min-width: 140px;
    }

    .event-item.task_completed .event-type {
      color: #2ecc71;
    }

    .event-item.task_failed .event-type {
      color: #e74c3c;
    }

    .event-item.task_created .event-type {
      color: #f39c12;
    }

    .empty-state {
      padding: 32px 20px;
      text-align: center;
      color: #444;
      font-size: 14px;
    }

    .filter-btn {
      background: #0f0f1a;
      border: 1px solid #2a2a3e;
      color: #888;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .filter-btn:hover {
      border-color: #444;
      color: #ccc;
    }

    .active-filter {
      background: #1a1a2e;
      border-color: #444;
      color: #ffffff;
    }

    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }

    .toast {
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateX(40px);
      transition: all 0.3s ease;
      min-width: 260px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(0);
    }

    .toast.task_completed {
      background: #0d2e1a;
      color: #2ecc71;
      border: 1px solid #2ecc71;
    }

    .toast.task_failed {
      background: #2e0d0d;
      color: #e74c3c;
      border: 1px solid #e74c3c;
    }

    .toast.task_created {
      background: #2e2200;
      color: #f39c12;
      border: 1px solid #f39c12;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #2a2a3e;
      font-size: 14px;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #666;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-top: 2px;
    }

    .detail-value {
      color: #e0e0e0;
      word-break: break-all;
    }

    .detail-json {
      background: #0f0f1a;
      padding: 10px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      color: #2ecc71;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <header>
    <h1>Task Queue Monitor</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="toggleForm()" style="
      background:#1a1a2e;
      border:1px solid #2a2a3e;
      color:#e0e0e0;
      padding:8px 18px;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
    ">+ New Task</button>
      <div id="connection-status">Connecting...</div>
    </div>
  </header>

  <!-- Submit Task Form -->
  <div id="task-form"
    style="display:none;background:#1a1a2e;border:1px solid #2a2a3e;border-radius:12px;padding:24px;margin-bottom:24px;">
    <h3 style="margin-bottom:16px;font-size:15px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;">New Task
    </h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:6px;">TYPE</label>
        <input id="input-type" placeholder="send_email" style="
        width:100%;background:#0f0f1a;border:1px solid #2a2a3e;
        color:#e0e0e0;padding:8px 12px;border-radius:8px;font-size:14px;
      " />
      </div>
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:6px;">PRIORITY (1-10)</label>
        <input id="input-priority" type="number" min="1" max="10" value="5" style="
        width:100%;background:#0f0f1a;border:1px solid #2a2a3e;
        color:#e0e0e0;padding:8px 12px;border-radius:8px;font-size:14px;
      " />
      </div>
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:6px;">MAX RETRIES</label>
        <input id="input-retries" type="number" min="0" max="10" value="3" style="
        width:100%;background:#0f0f1a;border:1px solid #2a2a3e;
        color:#e0e0e0;padding:8px 12px;border-radius:8px;font-size:14px;
      " />
      </div>
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:6px;">PAYLOAD (JSON)</label>
        <input id="input-payload" placeholder='{"key":"value"}' style="
        width:100%;background:#0f0f1a;border:1px solid #2a2a3e;
        color:#e0e0e0;padding:8px 12px;border-radius:8px;font-size:14px;
      " />
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="submitTask()" style="
      background:#2ecc71;border:none;color:#0f0f1a;
      padding:8px 20px;border-radius:8px;cursor:pointer;
      font-size:14px;font-weight:600;
    ">Submit</button>
      <button onclick="toggleForm()" style="
      background:transparent;border:1px solid #2a2a3e;color:#888;
      padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;
    ">Cancel</button>
      <span id="submit-feedback" style="font-size:13px;color:#666;line-height:2.2;"></span>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-card pending">
      <div class="value" id="stat-pending">0</div>
      <div class="label">Pending</div>
    </div>
    <div class="stat-card running">
      <div class="value" id="stat-running">0</div>
      <div class="label">Running</div>
    </div>
    <div class="stat-card completed">
      <div class="value" id="stat-completed">0</div>
      <div class="label">Completed</div>
    </div>
    <div class="stat-card failed">
      <div class="value" id="stat-failed">0</div>
      <div class="label">Failed</div>
    </div>
    <div class="stat-card workers">
      <div class="value" id="stat-workers">0</div>
      <div class="label">Workers</div>
    </div>
    <div class="stat-card avg">
      <div class="value" id="stat-avg">0s</div>
      <div class="label">Avg Execution</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <span>Live Event Log</span>
      <div class="live-dot"></div>
    </div>
    <div class="event-log" id="event-log">
      <div class="empty-state">Waiting for events...</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="margin-right:8px;">Tasks</span>
        <input id="search-input" placeholder="Search by type or ID..." oninput="handleSearch()" style="
    background:#0f0f1a;border:1px solid #2a2a3e;color:#e0e0e0;
    padding:4px 12px;border-radius:6px;font-size:13px;width:220px;
  " />

        <button onclick="setFilter('ALL')" id="filter-ALL" class="filter-btn active-filter">All</button>
        <button onclick="setFilter('PENDING')" id="filter-PENDING" class="filter-btn">Pending</button>
        <button onclick="setFilter('RUNNING')" id="filter-RUNNING" class="filter-btn">Running</button>
        <button onclick="setFilter('COMPLETED')" id="filter-COMPLETED" class="filter-btn">Completed</button>
        <button onclick="setFilter('FAILED')" id="filter-FAILED" class="filter-btn">Failed</button>
        <button onclick="setFilter('CANCELLED')" id="filter-CANCELLED" class="filter-btn">Cancelled</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button onclick="changePage(-1)" id="btn-prev" style="
        background:#0f0f1a;border:1px solid #2a2a3e;color:#888;
        padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px;
      ">← Prev</button>
        <span id="page-indicator" style="font-size:13px;color:#555;">Page 1</span>
        <button onclick="changePage(1)" id="btn-next" style="
        background:#0f0f1a;border:1px solid #2a2a3e;color:#888;
        padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px;
      ">Next →</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Status</th>
          <th>Priority</th>
          <th>Retries</th>
          <th>Created</th>
          <th>Duration</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tasks-table"></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-header">Workers</div>
    <table>
      <thead>
        <tr>
          <th>Worker ID</th>
          <th>Status</th>
          <th>Current Task</th>
          <th>Completed</th>
          <th>Last Heartbeat</th>
        </tr>
      </thead>
      <tbody id="workers-table"></tbody>
    </table>
  </div>

  <script>
    const API = "http://127.0.0.1:8000";
    const WS = "ws://127.0.0.1:8000/ws";
    let searchQuery = '';
    async function retryTask(taskId) {
      try {
        const res = await fetch(`${API}/tasks/${taskId}/retry`, {
          method: "POST"
        });
        if (res.ok) {
          await fetchTasks();
          await fetchStats();
        }
      } catch (e) {
        console.error("Retry failed", e);
      }
    }
    function handleSearch() {
      searchQuery = document.getElementById("search-input").value.trim().toLowerCase();
      currentPage = 1;
      renderTasksPage();
    }

    async function fetchStats() {
      const res = await fetch(`${API}/stats`);
      const data = await res.json();
      document.getElementById("stat-pending").textContent = data.pending;
      document.getElementById("stat-running").textContent = data.running;
      document.getElementById("stat-completed").textContent = data.completed;
      document.getElementById("stat-failed").textContent = data.failed;
      document.getElementById("stat-workers").textContent = data.active_workers;
      document.getElementById("stat-avg").textContent = data.avg_execution_seconds + "s";
    }
    let currentPage = 1;
    let currentFilter = 'ALL';
    const PAGE_SIZE = 20;
    let allTasks = [];
    function setFilter(filter) {
      let searchQuery = '';
      currentFilter = filter;
      currentPage = 1;

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active-filter');
      });
      document.getElementById(`filter-${filter}`).classList.add('active-filter');

      renderTasksPage();
    }

    async function fetchTasks() {
      const res = await fetch(`${API}/tasks`);
      allTasks = await res.json();
      allTasks.reverse();
      renderTasksPage();
    }

    function renderTasksPage() {
      const tbody = document.getElementById("tasks-table");
      const filtered = allTasks.filter(t => {
        const matchesFilter = currentFilter === 'ALL' || t.status === currentFilter;
        const matchesSearch = !searchQuery ||
          t.type.toLowerCase().includes(searchQuery) ||
          t.id.toLowerCase().includes(searchQuery);
        return matchesFilter && matchesSearch;
      });
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));

      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      const pageTasks = filtered.slice(start, end);

      document.getElementById("page-indicator").textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById("btn-prev").disabled = currentPage === 1;
      document.getElementById("btn-next").disabled = currentPage === totalPages;

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No tasks yet</td></tr>';
        return;
      }

      tbody.innerHTML = pageTasks.map(t => {
        const duration = t.started_at && t.completed_at
          ? ((new Date(t.completed_at) - new Date(t.started_at)) / 1000).toFixed(2) + "s"
          : t.started_at ? "Running..." : "-";

        const created = new Date(t.created_at).toLocaleTimeString();

        const retryBtn = t.status === 'FAILED'
          ? `<button onclick="retryTask('${t.id}')" style="
        background:transparent;border:1px solid #e74c3c;color:#e74c3c;
        padding:3px 10px;border-radius:6px;cursor:pointer;font-size:12px;
      ">Retry</button>`
          : '';
        const cancelBtn = t.status === 'PENDING'
          ? `<button onclick="cancelTask('${t.id}')" style="
      background:transparent;border:1px solid #888;color:#888;
      padding:3px 10px;border-radius:6px;cursor:pointer;font-size:12px;
    ">Cancel</button>`
          : '';

        return `<tr onclick="openModal(${JSON.stringify(t).replace(/"/g, '&quot;')})" style="cursor:pointer;" onmouseover="this.style.background='#1e1e2e'" onmouseout="this.style.background='transparent'">
  <td style="font-family:monospace;font-size:12px;color:#555">${t.id.substring(0, 8)}...</td>
  <td>${t.type}</td>
  <td><span class="badge ${t.status}">${t.status}</span></td>
  <td>${t.priority}</td>
  <td>${t.retry_count}/${t.max_retries}</td>
  <td>${created}</td>
  <td>${duration}</td>
  <td>${retryBtn}${cancelBtn}</td>
</tr>`;
      }).join("");
    }

    function changePage(direction) {
      const totalPages = Math.ceil(allTasks.length / PAGE_SIZE);
      currentPage = Math.max(1, Math.min(totalPages, currentPage + direction));
      renderTasksPage();
    }

    async function fetchWorkers() {
      const res = await fetch(`${API}/workers`);
      const workers = await res.json();
      const tbody = document.getElementById("workers-table");

      if (workers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No workers registered</td></tr>';
        return;
      }

      tbody.innerHTML = workers.map(w => {
        const heartbeat = new Date(w.last_heartbeat).toLocaleTimeString();
        return `<tr>
        <td style="font-family:monospace">${w.id}</td>
        <td><span class="badge ${w.status}">${w.status}</span></td>
        <td style="font-family:monospace;font-size:12px;color:#555">${w.current_task_id ? w.current_task_id.substring(0, 8) + "..." : "-"}</td>
        <td>${w.tasks_completed}</td>
        <td>${heartbeat}</td>
      </tr>`;
      }).join("");
    }

    function addEventLog(event) {
      const log = document.getElementById("event-log");
      const empty = log.querySelector(".empty-state");
      if (empty) empty.remove();

      const time = new Date().toLocaleTimeString();
      const item = document.createElement("div");
      item.className = `event-item ${event.event}`;
      item.innerHTML = `
      <span class="time">${time}</span>
      <span class="event-type">${event.event}</span>
      <span>${event.type || ""} ${event.task_id ? "— " + event.task_id.substring(0, 8) + "..." : ""}</span>
    `;
      log.insertBefore(item, log.firstChild);
    }

    function connectWebSocket() {
      const ws = new WebSocket(WS);
      const status = document.getElementById("connection-status");

      ws.onopen = () => {
        status.textContent = "Live";
        status.classList.add("connected");
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        addEventLog(data);
        showToast(data);
        fetchStats();
        fetchTasks();
        fetchWorkers();
      };

      ws.onclose = () => {
        status.textContent = "Disconnected";
        status.classList.remove("connected");
        setTimeout(connectWebSocket, 3000);
      };
    }

    fetchStats();
    fetchTasks();
    fetchWorkers();
    connectWebSocket();
    setInterval(() => { fetchStats(); fetchWorkers(); }, 5000);
    async function toggleForm() {
      const form = document.getElementById("task-form");
      const isHidden = form.style.display === "none";
      form.style.display = isHidden ? "block" : "none";

      if (isHidden) {
        try {
          const res = await fetch(`${API}/registry`);
          const data = await res.json();
          const input = document.getElementById("input-type");
          input.placeholder = data.registered_types.join(", ");
        } catch { }
      }
    }

    async function submitTask() {
      const type = document.getElementById("input-type").value.trim();
      const priority = parseInt(document.getElementById("input-priority").value);
      const maxRetries = parseInt(document.getElementById("input-retries").value);
      const payloadRaw = document.getElementById("input-payload").value.trim();
      const feedback = document.getElementById("submit-feedback");

      if (!type) {
        feedback.style.color = "#e74c3c";
        feedback.textContent = "Task type is required.";
        return;
      }

      let payload = null;
      if (payloadRaw) {
        try {
          payload = JSON.parse(payloadRaw);
        } catch {
          feedback.style.color = "#e74c3c";
          feedback.textContent = "Invalid JSON payload.";
          return;
        }
      }

      try {
        const res = await fetch(`${API}/tasks`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type, payload, priority, max_retries: maxRetries })
        });

        if (res.ok) {
          feedback.style.color = "#2ecc71";
          feedback.textContent = "Task submitted successfully.";
          document.getElementById("input-type").value = "";
          document.getElementById("input-payload").value = "";
          setTimeout(() => {
            feedback.textContent = "";
            toggleForm();
          }, 1500);
        } else {
          feedback.style.color = "#e74c3c";
          feedback.textContent = "Submission failed.";
        }
      } catch (e) {
        feedback.style.color = "#e74c3c";
        feedback.textContent = "Server error.";
      }
    }
    async function cancelTask(taskId) {
      try {
        const res = await fetch(`${API}/tasks/${taskId}/cancel`, {
          method: "POST"
        });
        if (res.ok) {
          await fetchTasks();
          await fetchStats();
        }
      } catch (e) {
        console.error("Cancel failed", e);
      }
    }
    function showToast(event) {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast ${event.event}`;

      const messages = {
        task_created: `Task created — ${event.type}`,
        task_completed: `Completed — ${event.type}`,
        task_failed: `Failed — ${event.type}`
      };

      toast.textContent = messages[event.event] || event.event;
      container.appendChild(toast);

      setTimeout(() => toast.classList.add("show"), 10);
      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    function openModal(task) {
      const content = document.getElementById("modal-content");

      const formatJson = (obj) => obj
        ? `<div class="detail-json">${JSON.stringify(obj, null, 2)}</div>`
        : '<span style="color:#555">—</span>';

      const formatDate = (d) => d ? new Date(d).toLocaleString() : '—';

      const duration = task.started_at && task.completed_at
        ? ((new Date(task.completed_at) - new Date(task.started_at)) / 1000).toFixed(2) + "s"
        : '—';

      content.innerHTML = `
    <div class="detail-row">
      <div class="detail-label">Task ID</div>
      <div class="detail-value" style="font-family:monospace;font-size:12px;">${task.id}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Type</div>
      <div class="detail-value">${task.type}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Status</div>
      <div class="detail-value"><span class="badge ${task.status}">${task.status}</span></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Priority</div>
      <div class="detail-value">${task.priority}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Retries</div>
      <div class="detail-value">${task.retry_count} / ${task.max_retries}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Created</div>
      <div class="detail-value">${formatDate(task.created_at)}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Started</div>
      <div class="detail-value">${formatDate(task.started_at)}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Completed</div>
      <div class="detail-value">${formatDate(task.completed_at)}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Duration</div>
      <div class="detail-value">${duration}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Payload</div>
      <div class="detail-value">${formatJson(task.payload)}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Result</div>
      <div class="detail-value">${formatJson(task.result)}</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Error</div>
      <div class="detail-value" style="color:#e74c3c">${task.error_message || '—'}</div>
    </div>
  `;

      const overlay = document.getElementById("modal-overlay");
      overlay.style.display = "flex";
    }

    function closeModal() {
      document.getElementById("modal-overlay").style.display = "none";
    }
  </script>
  <div id="toast-container"></div>
  <div id="modal-overlay" onclick="closeModal()" style="
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);z-index:2000;
  align-items:center;justify-content:center;
">
    <div onclick="event.stopPropagation()" style="
    background:#1a1a2e;border:1px solid #2a2a3e;border-radius:12px;
    padding:28px;width:560px;max-height:80vh;overflow-y:auto;
  ">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 style="font-size:16px;color:#fff;">Task Details</h3>
        <button onclick="closeModal()" style="
        background:transparent;border:none;color:#888;
        font-size:20px;cursor:pointer;
      ">✕</button>
      </div>
      <div id="modal-content"></div>
    </div>
  </div>
</body>

</html>
